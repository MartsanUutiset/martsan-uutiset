<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Martsan Uutiset</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1208">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Martsan Uutiset">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1208;--paper:#f5f0e8;--cream:#ede7d6;--red:#c0392b;--muted:#6b5f4e;--rule:#2c2416}
body{background:var(--paper);color:var(--ink);font-family:"Source Serif 4",Georgia,serif;font-size:15px;line-height:1.6;min-height:100vh}
.masthead{border-top:4px solid var(--rule);border-bottom:1px solid var(--rule);padding:.35rem 1.5rem;display:flex;justify-content:space-between;align-items:center;font-size:.68rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;background:var(--paper);position:relative;z-index:85}
.masthead-login{background:var(--red);color:#fff;border:none;padding:.15rem .6rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.62rem;letter-spacing:.1em}
.masthead-login:hover{background:var(--rule)}
.nameplate{text-align:center;padding:1rem 1rem .5rem;border-bottom:3px double var(--rule);cursor:pointer;user-select:none}
.nameplate h1{font-family:"Playfair Display",serif;font-size:clamp(2.2rem,7vw,5rem);font-weight:900;line-height:.9}
.nameplate h1 em{font-style:italic;color:var(--red)}
.np-rule{display:flex;align-items:center;gap:.8rem;margin:.5rem 0 .2rem;justify-content:center}
.np-rule span{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.np-rule::before,.np-rule::after{content:"";flex:1;max-width:160px;height:1px;background:var(--rule)}
.tagline{font-style:italic;font-size:.82rem;color:var(--muted);margin-bottom:.3rem}
.ticker-wrap{overflow:hidden;white-space:nowrap;border-bottom:2px solid var(--rule);position:relative;z-index:80}
.ticker{background:var(--red);color:#fff;padding:.35rem 0;display:block}
.ticker-label{display:inline-block;background:var(--ink);color:#fff;padding:0 .8rem;font-family:"Bebas Neue",sans-serif;font-size:.85rem;letter-spacing:.1em;margin-right:.8rem;vertical-align:middle}
.ticker-inner{display:inline-block;animation:tick 28s linear infinite;font-size:.75rem}
@keyframes tick{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.admin-bar{background:var(--ink);color:#e8c070;padding:.4rem 1.5rem;display:flex;justify-content:center;align-items:center;gap:1rem;font-family:"Bebas Neue",sans-serif;font-size:.78rem;letter-spacing:.12em;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.admin-bar button{background:var(--red);color:#fff;border:none;padding:.2rem .8rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.74rem;letter-spacing:.1em}
.confirm-bg{position:fixed;inset:0;background:rgba(26,18,8,.6);z-index:600;display:flex;align-items:center;justify-content:center}
.confirm-box{background:var(--paper);border:2px solid var(--rule);padding:1.8rem;width:300px;max-width:90vw;box-shadow:5px 5px 0 var(--rule);text-align:center}
.confirm-box p{font-family:"Playfair Display",serif;font-size:1.05rem;margin-bottom:1.4rem;line-height:1.4}
.confirm-btns{display:flex;gap:.8rem;justify-content:center}
.cbtn-yes{background:var(--red);color:#fff;border:none;padding:.5rem 1.4rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:.12em}
.cbtn-no{background:none;border:1px solid var(--muted);color:var(--muted);padding:.45rem 1rem;cursor:pointer;font-family:"Source Serif 4",serif;font-size:.82rem}
.cbtn-no:hover{border-color:var(--ink);color:var(--ink)}
.modal-bg{position:fixed;inset:0;background:rgba(26,18,8,.65);z-index:400;display:flex;align-items:center;justify-content:center}
.modal{background:var(--paper);border:2px solid var(--rule);padding:2rem;width:340px;max-width:92vw;box-shadow:6px 6px 0 var(--rule)}
.modal h2{font-family:"Playfair Display",serif;font-size:1.3rem;font-weight:900;margin-bottom:.2rem}
.modal p{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid #c8bba0}
.modal label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.2rem}
.modal input{width:100%;background:var(--cream);border:1px solid #b0a090;padding:.45rem .6rem;font-family:"Source Serif 4",serif;font-size:.9rem;color:var(--ink);outline:none;margin-bottom:.9rem}
.modal input:focus{border-color:var(--red)}
.modal-err{color:var(--red);font-size:.75rem;font-style:italic;min-height:1.1em;margin-bottom:.6rem}
.modal-btns{display:flex;gap:.6rem}
.btn-primary{flex:1;background:var(--ink);color:var(--paper);border:none;padding:.55rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:.12em}
.btn-primary:hover{background:var(--red)}
.btn-secondary{background:none;border:1px solid var(--muted);color:var(--muted);padding:.5rem .9rem;cursor:pointer;font-family:"Source Serif 4",serif;font-size:.75rem}
.btn-secondary:hover{border-color:var(--ink);color:var(--ink)}
.container{max-width:1050px;margin:0 auto;padding:0 1.2rem}
.filter-bar{max-width:1050px;margin:0 auto;padding:.6rem 1.2rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.filter-label{font-family:"Bebas Neue",sans-serif;font-size:.68rem;letter-spacing:.15em;color:var(--muted)}
.filter-btn{background:none;border:1px solid #c8bba0;color:var(--ink);padding:.2rem .65rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.68rem;letter-spacing:.1em;transition:all .15s}
.filter-btn:hover{background:var(--cream);border-color:var(--rule);color:var(--ink)}
.filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.filter-btn.cat-urheilu:hover{background:#d4e8ff;border-color:#3a7fd4;color:#1a3a6a}
.filter-btn.cat-kulttuuri:hover{background:#f0d4ff;border-color:#a855c8;color:#4a1a5a}
.filter-btn.cat-koulu:hover{background:#d4ffe8;border-color:#2ea85a;color:#0a4a2a}
.filter-btn.cat-muut:hover{background:#ffe8c8;border-color:#d4820a;color:#5a2a00}
.filter-btn.cat-urheilu.active{background:#3a7fd4;border-color:#3a7fd4;color:#fff}
.filter-btn.cat-kulttuuri.active{background:#a855c8;border-color:#a855c8;color:#fff}
.filter-btn.cat-koulu.active{background:#2ea85a;border-color:#2ea85a;color:#fff}
.filter-btn.cat-muut.active{background:#d4820a;border-color:#d4820a;color:#fff}
.filter-search-wrap{margin-left:auto}
.filter-search{background:var(--cream);border:1px solid #c8bba0;padding:.22rem .6rem;font-family:"Source Serif 4",serif;font-size:.78rem;color:var(--ink);outline:none;min-width:130px}
.filter-search:focus{border-color:var(--red)}
.grid{display:grid;grid-template-columns:1fr 2px 2fr 2px 1fr;padding:1.2rem 0}
.divider{background:repeating-linear-gradient(to bottom,var(--rule) 0,var(--rule) 5px,transparent 5px,transparent 9px);margin:0 .7rem}
.col{padding:0 .9rem}
.sec-label{font-family:"Bebas Neue",sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);border-bottom:2px solid var(--red);padding-bottom:.18rem;margin-bottom:.7rem}
.cat-badge{display:inline-block;font-family:"Bebas Neue",sans-serif;font-size:.58rem;letter-spacing:.12em;padding:.08rem .4rem;margin-bottom:.3rem;color:#fff}
.cat-urheilu{background:#3a7fd4}.cat-kulttuuri{background:#a855c8}.cat-koulu{background:#2ea85a}.cat-muut{background:#d4820a}.cat-default{background:var(--muted)}
.card{margin-bottom:1.1rem;padding-bottom:.9rem;border-bottom:1px dashed #b0a090;position:relative;cursor:pointer}
.card:last-child{border-bottom:none}
.card h3{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;line-height:1.2;margin-bottom:.2rem;transition:color .15s}
.card.lead h2{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,2.3vw,1.9rem);font-weight:900;line-height:1.1;margin-bottom:.35rem;transition:color .15s}
.card:hover h2,.card:hover h3{color:var(--red)}
.card .excerpt{font-size:.78rem;color:#3d3020;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.byline{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.25rem}
.hint{font-size:.65rem;color:var(--red);text-transform:uppercase;letter-spacing:.1em;margin-top:.35rem;display:inline-block}
.card-meta{display:flex;gap:.8rem;align-items:center;margin-top:.25rem}
.views,.readtime{font-size:.6rem;color:var(--muted);letter-spacing:.06em}
.like-btn{background:none;border:none;cursor:pointer;font-size:.72rem;color:var(--muted);padding:0;transition:color .15s;letter-spacing:.04em}
.like-btn:hover,.like-btn.liked{color:var(--red)}
.card-thumb{width:100%;max-height:140px;object-fit:cover;margin-bottom:.5rem;display:block}
.del-btn{background:var(--red);color:#fff;border:none;cursor:pointer;font-size:.65rem;padding:.2rem .5rem;position:absolute;top:0;right:0;display:none}
.admin-on .del-btn{display:block}
.edit-btn{background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:.65rem;padding:.2rem .5rem;position:absolute;top:0;right:3.2rem;display:none;font-family:"Bebas Neue",sans-serif;letter-spacing:.08em}
.admin-on .edit-btn{display:block}
.bookmark-btn{background:none;border:none;cursor:pointer;font-size:.75rem;position:absolute;top:0;right:1.8rem;color:var(--muted);padding:.1rem .2rem;display:none;transition:color .15s}
.bookmark-btn:hover,.bookmark-btn.bookmarked{color:var(--red)}
.logged-in .bookmark-btn,.admin-on .bookmark-btn{display:block}
.admin-on .bookmark-btn{right:5rem}
.empty{font-style:italic;font-size:.78rem;color:#b0a090;text-align:center;padding:1.5rem .5rem;border:1px dashed #c8bba0}
.divh{border:none;border-top:2px solid var(--rule);margin:1rem 0}
.art-wrap{max-width:680px;margin:0 auto;padding:1.5rem 1.2rem 2rem}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);cursor:pointer;border:none;background:none;padding:.4rem 0;margin-bottom:1.8rem;border-bottom:1px solid transparent;transition:color .15s,border-color .15s}
.back-btn:hover{color:var(--red);border-bottom-color:var(--red)}
.art-badge{font-family:"Bebas Neue",sans-serif;font-size:.68rem;letter-spacing:.2em;color:#fff;padding:.18rem .6rem;display:inline-block;margin-bottom:.9rem}
.art-title{font-family:"Playfair Display",serif;font-size:clamp(1.8rem,4.5vw,2.8rem);font-weight:900;line-height:1.05;margin-bottom:.9rem}
.art-byline{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-bottom:1rem;margin-bottom:1.5rem;border-bottom:2px solid var(--rule);display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.art-views,.art-readtime{font-size:.65rem;color:var(--muted)}
.art-like-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.2rem .6rem;cursor:pointer;font-size:.7rem;transition:all .15s}
.art-like-btn:hover,.art-like-btn.liked{background:var(--red);border-color:var(--red);color:#fff}
.art-bookmark-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.2rem .6rem;cursor:pointer;font-size:.7rem;transition:all .15s;display:none}
.art-bookmark-btn:hover,.art-bookmark-btn.bookmarked{background:var(--red);border-color:var(--red);color:#fff}
.logged-in .art-bookmark-btn,.admin-on .art-bookmark-btn{display:inline-block}
.art-edit-btn{background:var(--ink);color:var(--paper);border:none;padding:.2rem .7rem;cursor:pointer;font-size:.7rem;font-family:"Bebas Neue",sans-serif;letter-spacing:.1em;transition:background .15s;display:none}
.art-edit-btn:hover{background:var(--red)}
.admin-on .art-edit-btn{display:inline-block}
.art-hero{width:100%;max-height:420px;object-fit:cover;margin-bottom:1.5rem;display:block}
.art-hero-video{width:100%;max-height:420px;margin-bottom:1.5rem;display:block;background:#000}
.art-body{font-size:1rem;line-height:1.82;color:#2c2416;hyphens:auto}
.art-body p{margin-bottom:1.2em}
.art-body p:first-child::first-letter{font-family:"Playfair Display",serif;font-size:3.5em;font-weight:900;float:left;line-height:.75;margin:.05em .1em 0 0;color:var(--red)}
.art-body img{max-width:100%;margin:1rem 0;display:block}
.art-body video{max-width:100%;margin:1rem 0;display:block}
.art-end{border:none;border-top:3px double var(--rule);margin:2rem 0 1.2rem}
.art-del-btn{background:var(--red);color:#fff;border:none;font-size:.78rem;padding:.5rem 1.2rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;letter-spacing:.1em;display:none}
.admin-on .art-del-btn{display:inline-block}
.related-section{max-width:680px;margin:0 auto 2rem;padding:0 1.2rem}
.related-title{font-family:"Bebas Neue",sans-serif;font-size:.75rem;letter-spacing:.2em;color:var(--muted);border-bottom:1px solid #c8bba0;padding-bottom:.2rem;margin-bottom:.7rem}
.related-item{padding:.4rem 0;border-bottom:1px dashed #c8bba0;cursor:pointer;font-family:"Playfair Display",serif;font-size:.88rem;font-weight:700;transition:color .15s}
.related-item:last-child{border-bottom:none}
.related-item:hover{color:var(--red)}
.add-btn{display:none;margin:1.2rem auto 0;background:var(--ink);color:var(--paper);border:none;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:.15em;padding:.55rem 1.8rem;transition:background .2s}
.admin-on .add-btn,.logged-in .add-btn{display:block}
.add-btn:hover{background:var(--red)}
.editor{display:none;background:var(--cream);border-top:3px double var(--rule);border-bottom:3px double var(--rule);padding:1.3rem 1.5rem}
.editor.open{display:block}
.editor h2{font-family:"Playfair Display",serif;font-size:1.2rem;margin-bottom:.9rem;border-bottom:1px solid var(--rule);padding-bottom:.4rem}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:.7rem 1.3rem}
.fields .fw{grid-column:1/-1}
.fields label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.2rem}
.fields input,.fields select,.fields textarea{width:100%;background:var(--paper);border:1px solid #b0a090;padding:.4rem .55rem;font-family:"Source Serif 4",serif;font-size:.85rem;color:var(--ink);outline:none;transition:border-color .15s}
.fields input:focus,.fields select:focus,.fields textarea:focus{border-color:var(--red)}
.fields textarea{resize:vertical;min-height:110px}
.media-upload-area{grid-column:1/-1;border:2px dashed #b0a090;padding:1rem;text-align:center;transition:border-color .2s}
.media-upload-area:hover{border-color:var(--red)}
.media-upload-area input[type=file]{cursor:pointer;font-family:"Source Serif 4",serif;font-size:.78rem;color:var(--muted)}
.media-upload-area p{font-size:.78rem;color:var(--muted);margin-bottom:.4rem}
.media-preview{grid-column:1/-1;display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.3rem}
.media-preview-item{position:relative;display:inline-block}
.media-preview-item img{height:80px;width:auto;max-width:120px;object-fit:cover;display:block;border:1px solid #c8bba0}
.media-preview-item video{height:80px;width:auto;max-width:120px;display:block;border:1px solid #c8bba0}
.media-preview-del{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:.55rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.ea{margin-top:.9rem;display:flex;gap:.7rem;align-items:center}
.top-bar{display:flex;justify-content:center;align-items:center;gap:.8rem;padding:.5rem 1.5rem;background:var(--cream);border-bottom:1px solid #c8bba0;position:relative;z-index:150;flex-wrap:wrap}
.dl-wrap,.lang-wrap{position:relative;display:inline-block}
.dl-main-btn{background:var(--ink);color:var(--paper);border:none;padding:.38rem 1.1rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.82rem;letter-spacing:.15em;display:flex;align-items:center;gap:.4rem;transition:background .2s}
.dl-main-btn:hover{background:var(--red)}
.dl-arrow{font-size:.5rem;transition:transform .2s;display:inline-block}
.dl-main-btn.open .dl-arrow{transform:rotate(180deg)}
.dl-dropdown{position:absolute;top:calc(100% + 2px);left:0;background:var(--ink);min-width:160px;display:none;box-shadow:4px 4px 0 rgba(0,0,0,.25);border:1px solid #3a3020;z-index:300}
.dl-dropdown.open{display:block}
.dl-dropdown button{display:block;width:100%;background:none;border:none;border-bottom:1px solid #2e2418;color:var(--paper);padding:.45rem 1rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.78rem;letter-spacing:.12em;text-align:left;transition:background .15s}
.dl-dropdown button:last-child{border-bottom:none}
.dl-dropdown button:hover{background:var(--red)}
.lang-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.32rem .8rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.78rem;letter-spacing:.12em;transition:all .15s}
.lang-btn:hover{border-color:var(--ink);color:var(--ink)}
.lang-dropdown{position:absolute;top:calc(100% + 2px);left:0;background:var(--paper);border:1px solid var(--rule);box-shadow:4px 4px 0 rgba(0,0,0,.15);min-width:140px;display:none;z-index:300}
.lang-dropdown.open{display:block}
.lang-option{display:block;width:100%;background:none;border:none;border-bottom:1px dashed #c8bba0;color:var(--ink);padding:.4rem .8rem;cursor:pointer;font-family:"Source Serif 4",serif;font-size:.78rem;text-align:left;transition:background .15s}
.lang-option:last-child{border-bottom:none}
.lang-option:hover{background:var(--cream)}
.send-msg-top-btn,.bookmarks-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.32rem .8rem;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.78rem;letter-spacing:.12em;transition:all .15s}
.send-msg-top-btn:hover{border-color:var(--red);color:var(--red)}
.bookmarks-btn:hover{border-color:var(--ink);color:var(--ink)}
.msg-list-modal,.inbox-modal,.users-modal,.bookmarks-modal,.profile-modal{background:var(--paper);border:2px solid var(--rule);padding:1.5rem;box-shadow:6px 6px 0 var(--rule);max-height:80vh;overflow-y:auto}
.msg-list-modal{width:500px;max-width:95vw}
.inbox-modal{width:500px;max-width:95vw}
.users-modal{width:420px;max-width:95vw}
.bookmarks-modal{width:420px;max-width:95vw}
.profile-modal{width:460px;max-width:95vw}
.msg-list-modal h2,.inbox-modal h2,.users-modal h2,.bookmarks-modal h2,.profile-modal h2{font-family:"Playfair Display",serif;font-size:1.2rem;font-weight:900;margin-bottom:.6rem;border-bottom:1px solid var(--rule);padding-bottom:.4rem}
.admin-search{width:100%;background:var(--cream);border:1px solid #b0a090;padding:.35rem .6rem;font-family:"Source Serif 4",serif;font-size:.82rem;color:var(--ink);outline:none;margin-bottom:.8rem}
.admin-search:focus{border-color:var(--red)}
.msg-row{padding:.5rem 0;border-bottom:1px dashed #c8bba0;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.msg-row:last-of-type{border-bottom:none}
.msg-row-from{font-family:"Bebas Neue",sans-serif;font-size:.8rem;letter-spacing:.1em;color:var(--ink);transition:color .15s;white-space:nowrap}
.msg-row:hover .msg-row-from{color:var(--red)}
.msg-row-subject{font-size:.75rem;color:var(--muted);font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 .4rem}
.msg-row-del{background:var(--red);color:#fff;border:none;cursor:pointer;font-size:.6rem;padding:.15rem .4rem;flex-shrink:0}
.msg-detail{background:var(--cream);border:1px solid #c8bba0;padding:.8rem;margin-top:.3rem;font-size:.82rem;line-height:1.6;display:none}
.msg-detail.open{display:block}
.send-modal{background:var(--paper);border:2px solid var(--rule);padding:2rem;width:360px;max-width:92vw;box-shadow:6px 6px 0 var(--rule)}
.send-modal h2{font-family:"Playfair Display",serif;font-size:1.2rem;font-weight:900;margin-bottom:.2rem}
.send-modal p{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid #c8bba0}
.send-modal label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.2rem}
.send-modal input,.send-modal textarea{width:100%;background:var(--cream);border:1px solid #b0a090;padding:.4rem .55rem;font-family:"Source Serif 4",serif;font-size:.88rem;color:var(--ink);outline:none;display:block;margin-bottom:.7rem}
.send-modal input:focus,.send-modal textarea:focus{border-color:var(--red)}
.send-modal textarea{resize:vertical;min-height:80px}

function attachEvents(){
  function on(id,fn){var el=document.getElementById(id);if(el)el.addEventListener("click",fn);}
  on("cbtn-yes",function(){if(confirmPending){var id=confirmPending.id,gb=confirmPending.goBack;confirmPending=null;
    fetch(SUPABASE_URL+"/rest/v1/articles?id=eq."+id,{method:"DELETE",headers:_authSB()});
    articles=articles.filter(function(a){return a.id!==id;});if(gb)page="front";render();}});
  on("cbtn-no",function(){confirmPending=null;render();});
  on("err-dismiss",function(){errorMsg="";render();});
  on("lang-btn",function(e){e.stopPropagation();showLangMenu=!showLangMenu;render();});
  on("lang-fi",function(){lang="fi";showLangMenu=false;render();});
  on("lang-en",function(){lang="en";showLangMenu=false;render();});
  on("lang-sv",function(){lang="sv";showLangMenu=false;render();});
  on("dl-main-btn",function(e){
    e.stopPropagation();
    var btn=document.getElementById("dl-main-btn"),dd=document.getElementById("dl-dropdown");
    if(!btn||!dd)return;
    var op=!dd.classList.contains("open");
    dd.classList.toggle("open");btn.classList.toggle("open");
    if(op){setTimeout(function(){function c(e){if(!e.target.closest(".dl-wrap")){var d=document.getElementById("dl-dropdown"),b=document.getElementById("dl-main-btn");if(d)d.classList.remove("open");if(b)b.classList.remove("open");document.removeEventListener("click",c);}}document.addEventListener("click",c);},10);}
  });
  on("dl-android",doInstall);on("dl-windows",doInstall);on("dl-mac",doInstall);
  on("lbtn",doLogin);on("lcbtn",function(){showLogin=false;render();});
  var lu=document.getElementById("lu"),lp=document.getElementById("lp");
  if(lu)lu.addEventListener("keydown",function(e){if(e.key==="Enter"&&lp)lp.focus();});
  if(lp)lp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  on("go-reg",function(){showLogin=false;showRegister=true;regErr="";render();});
  on("go-login",function(){showRegister=false;showLogin=true;loginErr="";render();});
  on("rbtn",doRegister);on("rcbtn",function(){showRegister=false;render();});
  var rp2=document.getElementById("rp2");if(rp2)rp2.addEventListener("keydown",function(e){if(e.key==="Enter")doRegister();});
  function fl(){admin=false;loggedIn=false;currentUser="";showEditor=false;showInbox=false;showModPanel=false;showMsgList=false;showSendMsg=false;showBookmarks=false;showProfile=false;openMsgId=null;filterCat="";filterSearch="";editId=null;pendingMedia=[];render();}

  on("open-inbox-btn",function(){showInbox=true;render();});on("close-inbox-btn",function(){showInbox=false;render();});
  on("open-msgs-btn",function(){showMsgList=true;render();});on("close-msgs-btn",function(){showMsgList=false;openMsgId=null;render();});
  on("open-mod-btn",function(){showModPanel=true;render();});on("close-mod-btn",function(){showModPanel=false;render();});
  on("open-bm-btn",function(){showBookmarks=true;render();});on("close-bm-btn",function(){showBookmarks=false;render();});
  on("open-profile-btn",function(){showProfile=true;render();});on("close-profile-btn",function(){showProfile=false;render();});
  var msInp=document.getElementById("msg-search-inp");
  if(msInp){msInp.addEventListener("input",function(){msgSearch=this.value;var v=this.value;render();restoreFocus("msg-search-inp",v);});}
  var usInp=document.getElementById("user-search-inp");
  if(usInp){usInp.addEventListener("input",function(){userSearch=this.value;var v=this.value;render();restoreFocus("user-search-inp",v);});}
  var fsInp=document.getElementById("filter-search-inp");
  if(fsInp){fsInp.addEventListener("input",function(){filterSearch=this.value;var v=this.value;render();restoreFocus("filter-search-inp",v);});fsInp.addEventListener("click",function(e){e.stopPropagation();});}
  on("fcat-all",function(){filterCat="";render();});
  CATS.forEach(function(c){on("fcat-"+c,function(){filterCat=(filterCat===c?"":c);render();});});
  (window._pending||[]).forEach(function(a){
    on("approve-"+a.id,function(){
      var authH=_authSB();
      fetch(SUPABASE_URL+"/rest/v1/articles",{method:"POST",headers:Object.assign({},authH,{"Prefer":"return=representation"}),body:JSON.stringify({title:a.title,author:a.author,section:a.section,col:a.column,body:a.body})})
        .then(function(r){return r.json();}).then(function(rows){
          if(rows&&rows[0]){a.id=rows[0].id;articles.push(a);}
          fetch(SUPABASE_URL+"/rest/v1/pending?id=eq."+a.id,{method:"DELETE",headers:authH});
          window._pending=(window._pending||[]).filter(function(p){return p.id!==a.id;});render();
        });
    });

      fetch(SUPABASE_URL+"/rest/v1/pending?id=eq."+a.id,{method:"DELETE",headers:_authSB()});

    });

  getUsers().filter(function(u){return u.user!==ADMIN_USER;}).forEach(function(u){
    on("mod-toggle-"+u.user,function(){var us=getUsers(),t=us.find(function(x){return x.user===u.user;});if(t)t.moderator=!t.moderator;saveUsers(us);render();});
    on("del-user-"+u.user,function(){window._users=getUsers().filter(function(x){return x.user!==u.user;});save();render();});
  });
  (window._messages||[]).forEach(function(m){
    on("mrow-"+m.id,function(){openMsgId=(openMsgId===m.id?null:m.id);render();});
    on("mdel-"+m.id,function(){window._messages=(window._messages||[]).filter(function(x){return x.id!==m.id;});if(openMsgId===m.id)openMsgId=null;save();render();});
  });
  on("open-send-msg-btn",function(){showSendMsg=true;render();});
  on("cancel-msg-btn",function(){showSendMsg=false;render();});
  on("send-msg-btn",function(){
    var subj=(document.getElementById("msg-subject").value||"").trim();
    var txt=(document.getElementById("msg-text").value||"").trim();
    if(!txt)return;
    window._messages=window._messages||[];
    window._messages.push({id:Date.now(),from:currentUser,subject:subj||"(ei aihetta)",text:txt,date:todayFI()});
    showSendMsg=false;save();showNotif("Viesti l\u00e4hetetty!");render();
  });
  (window._comments||[]).forEach(function(c){
    on("crow-"+c.id,function(){openCommentIds[c.id]=!openCommentIds[c.id];render();});
    on("cdel-"+c.id,function(){window._comments=(window._comments||[]).filter(function(x){return x.id!==c.id;});delete openCommentIds[c.id];save();render();});
  });
  on("comment-submit",function(){
    var inp=document.getElementById("comment-input"),btn=document.getElementById("comment-submit");
    if(!inp||!btn)return;
    var txt=inp.value.trim(),aid=parseInt(btn.getAttribute("data-artid"));
    if(!txt)return;
    window._comments=window._comments||[];
    window._comments.push({id:Date.now(),articleId:aid,author:currentUser,text:txt,date:todayFI()});
    save();render();
  });
  on("art-like-btn",function(){var btn=document.getElementById("art-like-btn");if(btn&&loggedIn)toggleLike(parseInt(btn.getAttribute("data-id")));else if(!loggedIn){showLogin=true;loginErr="";render();}});
  on("art-bm-btn",function(){var btn=document.getElementById("art-bm-btn");if(btn)toggleBookmark(parseInt(btn.getAttribute("data-id")));});
  on("art-edit-btn",function(){var btn=document.getElementById("art-edit-btn");if(btn){editId=parseInt(btn.getAttribute("data-id"));showEditor=true;page="front";render();}});
  document.querySelectorAll("[data-like]").forEach(function(btn){btn.addEventListener("click",function(e){e.stopPropagation();if(loggedIn)toggleLike(parseInt(btn.getAttribute("data-like")));else{showLogin=true;loginErr="";render();}});});
  document.querySelectorAll("[data-bm]").forEach(function(btn){btn.addEventListener("click",function(e){e.stopPropagation();toggleBookmark(parseInt(btn.getAttribute("data-bm")));});});
  document.querySelectorAll("[data-edit]").forEach(function(btn){btn.addEventListener("click",function(e){e.stopPropagation();editId=parseInt(btn.getAttribute("data-edit"));showEditor=true;render();});});
  document.querySelectorAll("[id^=\"bm-open-\"]").forEach(function(el){el.addEventListener("click",function(e){if(e.target.closest("[id^=\"bm-del-\"]"))return;var id=parseInt(el.id.replace("bm-open-",""));showBookmarks=false;page="article";openId=id;trackView(id);render();});});
  document.querySelectorAll("[id^=\"bm-del-\"]").forEach(function(btn){btn.addEventListener("click",function(e){e.stopPropagation();var id=parseInt(btn.id.replace("bm-del-",""));var bms=getBookmarks(),i=bms.indexOf(id);if(i!==-1)bms.splice(i,1);setBookmarks(bms);render();});});
  document.querySelectorAll("[id^=\"prof-art-\"]").forEach(function(el){el.addEventListener("click",function(){var aid=parseInt(el.id.replace("prof-art-",""));showProfile=false;page="article";openId=aid;trackView(aid);render();});});
  document.querySelectorAll("[id^=\"prof-bm-\"]").forEach(function(el){el.addEventListener("click",function(){var id=parseInt(el.id.replace("prof-bm-",""));showProfile=false;page="article";openId=id;trackView(id);render();});});
  document.querySelectorAll("[id^=\"rel-\"]").forEach(function(el){el.addEventListener("click",function(){var id=parseInt(el.id.replace("rel-",""));page="article";openId=id;trackView(id);render();});});
  on("masthead-login-btn",function(){showLogin=true;loginErr="";render();});
  on("login-link",function(){showLogin=true;loginErr="";render();});
  on("nameplate",function(){page="front";render();});
  var atrig=document.getElementById("atrig");
  if(atrig)atrig.addEventListener("click",function(){tapCount++;clearTimeout(tapTimer);if(tapCount>=5){tapCount=0;showLogin=true;loginErr="";render();}else tapTimer=setTimeout(function(){tapCount=0;},2000);});
  on("back-btn",function(){page="front";render();});
  var ad=document.getElementById("art-del-btn");
  if(ad)ad.addEventListener("click",function(){confirmPending={id:parseInt(ad.dataset.id),goBack:true};render();});
  document.querySelectorAll("[data-open]").forEach(function(el){
    el.addEventListener("click",function(e){
      if(e.target.closest("[data-del]")||e.target.closest("[data-bm]")||e.target.closest("[data-edit]")||e.target.closest("[data-like]"))return;
      var id=parseInt(el.dataset.open);page="article";openId=id;trackView(id);render();
    });
  });
  document.querySelectorAll("[data-del]").forEach(function(btn){btn.addEventListener("click",function(e){e.stopPropagation();confirmPending={id:parseInt(btn.dataset.del),goBack:false};render();});});
  // Media poisto preview
  document.querySelectorAll("[data-mi]").forEach(function(btn){btn.addEventListener("click",function(e){e.stopPropagation();var i=parseInt(btn.getAttribute("data-mi"));pendingMedia.splice(i,1);render();});});
  // Mediakenttä
  var mfi=document.getElementById("media-file-inp");
  if(mfi){
    mfi.addEventListener("change",function(){
      var files=Array.from(this.files);
      if(!files.length)return;
      showNotif("Ladataan mediaa\u2026");
      var uploads=files.map(function(f){
        return new Promise(function(resolve,reject){
          var ext=f.name.split(".").pop();
          var fname=Date.now()+"_"+Math.random().toString(36).slice(2)+"."+ext;
          var t=f.type.startsWith("video")?"video":"image";
          fetch(SUPABASE_URL+"/storage/v1/object/media/"+fname,{
            method:"POST",
            headers:Object.assign({},_authSB(),{"Content-Type":f.type,"x-upsert":"true"}),
            body:f
          }).then(function(r){
            if(!r.ok)throw new Error("Upload failed: "+r.status);
            var url=SUPABASE_URL+"/storage/v1/object/public/media/"+fname;
            resolve({type:t,url:url});
          }).catch(function(e){
            showNotif("Lataus ep\u00e4onnistui: "+e.message);
            reject(e);
          });
        });
      });
      Promise.all(uploads).then(function(items){
        pendingMedia=pendingMedia.concat(items);
        showNotif("Media ladattu! ("+pendingMedia.length+" tiedostoa)");
        render(); // Re-render to show preview
      }).catch(function(e){
        showNotif("Lataus ep\u00e4onnistui.");
      });
    });
  }
  on("add-btn",function(){showEditor=!showEditor;if(!showEditor){editId=null;pendingMedia=[];}render();});
  on("cancel-btn",function(){showEditor=false;editId=null;pendingMedia=[];render();});
  on("pub-btn",function(){
    var title=(document.getElementById("ft").value||"").trim();
    var body=(document.getElementById("fb").value||"").trim();
    if(!title){errorMsg="Kirjoita otsikko.";render();return;}
    if(!body){errorMsg="Kirjoita teksti.";render();return;}
    if(editId){
      var idx=articles.findIndex(function(a){return a.id===editId;});
      if(idx!==-1){
        articles[idx].title=title;
        articles[idx].author=(document.getElementById("fa").value||"").trim();
        articles[idx].section=(document.getElementById("fs").value||"");
        articles[idx].column=document.getElementById("fc").value;
        articles[idx].body=body;
        if(pendingMedia.length)articles[idx].media=(articles[idx].media||[]).concat(pendingMedia);
      }
      showEditor=false;editId=null;pendingMedia=[];save();showNotif("Artikkeli p\u00e4ivitetty!");render();return;
    }
    // Capture media NOW before any async/render calls
    var capturedMedia=pendingMedia.slice();
    var id=nextId++;
    var art={id:id,title:title,author:(document.getElementById("fa").value||"").trim(),section:(document.getElementById("fs").value||""),column:document.getElementById("fc").value,body:body,date:todayFI(),media:capturedMedia};
    var authH=_authSB();
    if(admin){
      fetch(SUPABASE_URL+"/rest/v1/articles",{method:"POST",headers:Object.assign({},authH,{"Prefer":"return=representation"}),body:JSON.stringify({title:art.title,author:art.author,section:art.section,col:art.column,body:art.body,media:JSON.stringify(capturedMedia)})})
        .then(function(r){return r.json();}).then(function(rows){
          if(rows&&rows[0]){art.id=rows[0].id;}
          articles.push(art);showEditor=false;pendingMedia=[];page="article";openId=art.id;trackView(art.id);render();
        }).catch(function(e){errorMsg="Julkaisu ep\u00e4onnistui.";render();});
    } else {
      fetch(SUPABASE_URL+"/rest/v1/pending",{method:"POST",headers:authH,body:JSON.stringify({title:art.title,author:art.author,section:art.section,col:art.column,body:art.body,media:JSON.stringify(capturedMedia),submitted_by:currentUser})})
        .then(function(){window._pending=window._pending||[];window._pending.push(art);showEditor=false;pendingMedia=[];showNotif(T("approved"));render();})
        .catch(function(e){errorMsg="L\u00e4hetys ep\u00e4onnistui.";render();});
    }
    // Don't call render() here - wait for async to complete
  });
}

function trackView(id){window._views=window._views||{};window._views[id]=(window._views[id]||0)+1;}

function doLogin(){
  var u=(document.getElementById("lu").value||"").trim(),p=(document.getElementById("lp").value||"");
  if(u===ADMIN_USER&&p===ADMIN_PASS){showLogin=false;admin=true;loggedIn=true;currentUser=u;render();return;}
  fetch(SUPABASE_URL+"/auth/v1/token?grant_type=password",{
    method:"POST",headers:SB,body:JSON.stringify({email:u,password:p})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.access_token){
      window._sbToken=d.access_token;
      currentUser=d.user.email;
      loggedIn=true;showLogin=false;loginErr="";
      fetch(SUPABASE_URL+"/rest/v1/user_roles?user_id=eq."+d.user.id+"&select=role",{
        headers:Object.assign({},SB,{"Authorization":"Bearer "+d.access_token})
      }).then(function(r){return r.json();}).then(function(roles){
        window._userRole=(roles&&roles[0])?roles[0].role:"";
        admin=window._userRole==="admin";
        render();
      });
    } else {loginErr=T("loginErr");render();}
  }).catch(function(){loginErr=T("loginErr");render();});
}

function doRegister(){
  var u=(document.getElementById("ru").value||"").trim(),p=(document.getElementById("rp").value||""),p2=(document.getElementById("rp2").value||"");
  if(!u||!u.includes("@")){regErr="Kirjoita s\u00e4hk\u00f6postiosoite.";render();return;}
  if(p.length<6){regErr="Salasanan pit\u00e4\u00e4 olla v\u00e4hint\u00e4\u00e4n 6 merkki\u00e4.";render();return;}
  if(p!==p2){regErr="Salasanat eiv\u00e4t t\u00e4sm\u00e4\u00e4.";render();return;}
  fetch(SUPABASE_URL+"/auth/v1/signup",{
    method:"POST",headers:SB,body:JSON.stringify({email:u,password:p})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.id||d.user){showRegister=false;showNotif("Tunnus luotu! Kirjaudu sis\u00e4\u00e4n.");showLogin=true;render();}
    else{regErr=d.message||"Rekister\u00f6inti ep\u00e4onnistui.";render();}
  }).catch(function(){regErr="Rekister\u00f6inti ep\u00e4onnistui.";render();});
}

function sbToArt(r){return {id:r.id,title:r.title,author:r.author||"",section:r.section||"",column:r.col||"center",body:r.body,date:r.created_at?r.created_at.substring(0,10):"",media:r.media?JSON.parse(r.media):[]};}
var _authSB=function(){return Object.assign({},SB,{Authorization:"Bearer "+(window._sbToken||SUPABASE_KEY),"Prefer":"return=minimal"});};

async function save(){/* Supabase: yksittäiset operaatiot tallentavat suoraan */}

async function load(){
  try{
    var h=SB;
    var results=await Promise.all([
      fetch(SUPABASE_URL+"/rest/v1/articles?select=*&order=id.asc",{headers:h}).then(function(r){return r.json();}),
      fetch(SUPABASE_URL+"/rest/v1/pending?select=*&order=id.asc",{headers:h}).then(function(r){return r.json();}),
      fetch(SUPABASE_URL+"/rest/v1/messages?select=*&order=id.desc",{headers:h}).then(function(r){return r.json();}),
      fetch(SUPABASE_URL+"/rest/v1/comments?select=*&order=id.asc",{headers:h}).then(function(r){return r.json();})
    ]);
    var arts=results[0],pend=results[1],msgs=results[2],cmts=results[3];
    articles=(arts&&!arts.error)?arts.map(sbToArt):[];
    window._pending=(pend&&!pend.error)?pend.map(function(p){return {id:p.id,title:p.title,author:p.author,section:p.section,column:p.col,body:p.body,date:p.created_at?p.created_at.substring(0,10):"",media:[]};}):[];
    window._messages=(msgs&&!msgs.error)?msgs.map(function(m){return {id:m.id,from:m.from_user||"",subject:m.subject,text:m.body||"",date:m.created_at?m.created_at.substring(0,10):""};}):[];
    window._comments=(cmts&&!cmts.error)?cmts.map(function(c){return {id:c.id,articleId:c.article_id,author:c.author,text:c.body||"",date:c.created_at?c.created_at.substring(0,10):""};}):[];
    window._likes={};window._users=[];
    dataLoaded=true;
  }catch(e){errorMsg="Tietojen lataus ep\u00e4onnistui. Tarkista yhteys.";dataLoaded=true;}
}

render();
setTimeout(function(){var b=document.querySelector(".loading-bar-inner");if(b)b.classList.add("go");},30);
var dataReady=false,barDone=false;
function tryHide(){
  if(!dataReady||!barDone)return;
  var ls=document.getElementById("loading-screen");
  if(ls){ls.classList.add("fade-out");setTimeout(function(){ls.style.display="none";},500);}
  startAutoRefresh();
}
setTimeout(function(){barDone=true;tryHide();},1450);
load().then(function(){render();dataReady=true;tryHide();}).catch(function(){render();dataReady=true;tryHide();});
</script>
</body>
</html>
